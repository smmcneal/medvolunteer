name: Notion PR Sync

# Automatically updates Notion when PRs move through the GitHub lifecycle.
# Extracts DEV-### (bugs / dev tasks) or AB-### (feature requests) from the
# branch name or PR title and routes to the matching database.
#
# Required GitHub secrets:
#   NOTION_TOKEN                   — Notion integration secret
#   NOTION_DEV_TASKS_DB_ID         — Dev Tasks & QA database ID
#   NOTION_FEATURE_REQUESTS_DB_ID  — Feature Requests database ID

on:
  pull_request:
    types: [opened, reopened, review_requested, closed]

jobs:
  sync-notion:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract task ID
        id: task
        env:
          BRANCH: ${{ github.head_ref }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Branch name first, then PR title. Matches DEV-### and AB-###.
          TASK_ID=$(echo "$BRANCH $TITLE" | grep -oiE '(DEV|AB)-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]')

          if [ -z "$TASK_ID" ]; then
            echo "No DEV-###/AB-### found in branch '$BRANCH' or title '$TITLE' — skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Found task: $TASK_ID"
          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

      # ── PR opened / reopened → Code Review ────────────────────────────────
      - name: Set status → Code Review
        if: >
          steps.task.outputs.found == 'true' &&
          (github.event.action == 'opened' ||
           github.event.action == 'reopened' ||
           github.event.action == 'review_requested')
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DEV_TASKS_DB_ID: ${{ secrets.NOTION_DEV_TASKS_DB_ID }}
          NOTION_FEATURE_REQUESTS_DB_ID: ${{ secrets.NOTION_FEATURE_REQUESTS_DB_ID }}
        run: node scripts/notion-sync.cjs status "${{ steps.task.outputs.task_id }}" "Code Review"

      - name: Add PR link
        if: >
          steps.task.outputs.found == 'true' &&
          (github.event.action == 'opened' || github.event.action == 'reopened')
        continue-on-error: true
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DEV_TASKS_DB_ID: ${{ secrets.NOTION_DEV_TASKS_DB_ID }}
          NOTION_FEATURE_REQUESTS_DB_ID: ${{ secrets.NOTION_FEATURE_REQUESTS_DB_ID }}
        run: node scripts/notion-sync.cjs pr "${{ steps.task.outputs.task_id }}" "${{ github.event.pull_request.html_url }}"

      # ── PR merged → Done ──────────────────────────────────────────────────
      - name: Set status → Done
        if: >
          steps.task.outputs.found == 'true' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == true
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DEV_TASKS_DB_ID: ${{ secrets.NOTION_DEV_TASKS_DB_ID }}
          NOTION_FEATURE_REQUESTS_DB_ID: ${{ secrets.NOTION_FEATURE_REQUESTS_DB_ID }}
        run: node scripts/notion-sync.cjs status "${{ steps.task.outputs.task_id }}" "Done"

      # ── PR closed without merge → Ready ───────────────────────────────────
      - name: Set status → Ready (PR closed unmerged)
        if: >
          steps.task.outputs.found == 'true' &&
          github.event.action == 'closed' &&
          github.event.pull_request.merged == false
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DEV_TASKS_DB_ID: ${{ secrets.NOTION_DEV_TASKS_DB_ID }}
          NOTION_FEATURE_REQUESTS_DB_ID: ${{ secrets.NOTION_FEATURE_REQUESTS_DB_ID }}
        run: node scripts/notion-sync.cjs status "${{ steps.task.outputs.task_id }}" "Ready"
