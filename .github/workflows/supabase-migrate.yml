name: Supabase Migrations

# Applies pending Supabase migrations when PRs that touch migration files are
# merged to main. Also runs on manual dispatch for emergency applies.
#
# Required GitHub secrets:
#   SUPABASE_ACCESS_TOKEN  — Personal access token from app.supabase.com/account/tokens
#   SUPABASE_PROJECT_ID    — Project ref (e.g. abcdefghijkl) from project settings
#   SUPABASE_DB_PASSWORD   — Database password from project settings
#   NOTION_TOKEN           — (optional) Notion integration secret
#   NOTION_DEV_TASKS_DB_ID — (optional) Dev Tasks & QA database ID

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (show pending migrations, do not apply)'
        required: false
        default: 'false'
        type: boolean

jobs:
  # Single job that always runs (prevents "No jobs were run" failure).
  # Migration steps are gated by SHOULD_MIGRATE env var so they only run
  # when supabase/migrations/** files actually changed.
  migrate:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for migration changes
        id: guard
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "SHOULD_MIGRATE=true" >> "$GITHUB_ENV"
            echo "Manual dispatch — will run migrations."
          elif git diff --name-only HEAD~1 HEAD | grep -q '^supabase/migrations/'; then
            echo "SHOULD_MIGRATE=true" >> "$GITHUB_ENV"
            echo "Migration files changed — will apply."
          else
            echo "SHOULD_MIGRATE=false" >> "$GITHUB_ENV"
            echo "No migration files changed — skipping migration steps."
          fi

      - name: Setup Supabase CLI
        if: env.SHOULD_MIGRATE == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: List pending migrations (dry run)
        if: env.SHOULD_MIGRATE == 'true' && inputs.dry_run == 'true'
        run: |
          echo "=== Pending migrations ==="
          supabase db push --dry-run \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply migrations
        if: env.SHOULD_MIGRATE == 'true' && inputs.dry_run != 'true'
        run: |
          supabase db push \
            --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD:  ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Setup Node.js (for Notion sync)
        if: env.SHOULD_MIGRATE == 'true' && inputs.dry_run != 'true' && secrets.NOTION_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Notify Notion (migrations applied)
        if: env.SHOULD_MIGRATE == 'true' && inputs.dry_run != 'true' && secrets.NOTION_TOKEN != ''
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DEV_TASKS_DB_ID: ${{ secrets.NOTION_DEV_TASKS_DB_ID }}
        run: |
          RECENT_COMMITS=$(git log --oneline -10)
          TASK_ID=$(echo "$RECENT_COMMITS" | grep -oE 'DEV-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]')
          if [ -n "$TASK_ID" ]; then
            echo "Updating Notion task $TASK_ID → Testing (migrations applied)"
            node scripts/notion-sync.cjs status "$TASK_ID" "Testing"
          else
            echo "No DEV-### found in recent commits — skipping Notion update."
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Migration Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** main" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Time:** $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          if [ "${SHOULD_MIGRATE}" != "true" ]; then
            echo "- **Mode:** Skipped (no migration files changed)" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "- **Mode:** Dry run (no changes applied)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **Mode:** Applied to production Supabase" >> "$GITHUB_STEP_SUMMARY"
          fi
