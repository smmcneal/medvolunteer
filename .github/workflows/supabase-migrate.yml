name: Supabase Migrations

# Applies pending Supabase migrations when migration files are merged to main.
# Also runs on manual dispatch for emergency applies.
#
# Required secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID,
#   SUPABASE_DB_PASSWORD, NOTION_TOKEN (optional), NOTION_DEV_TASKS_DB_ID (optional)

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run only (show pending migrations, do not apply)'
        required: false
        default: 'false'
        type: boolean

# Never run two `db push` invocations concurrently
concurrency:
  group: supabase-migrate
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Triggering is handled by the `paths:` filter above (a HEAD~1 diff here
      # would miss migrations buried in multi-commit pushes). This guard only
      # checks that the deploy secrets exist.
      - name: Check secrets
        id: guard
        env:
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "SUPABASE_PROJECT_ID secret not set — skipping migrations."
            echo "SHOULD_MIGRATE=false" >> "$GITHUB_ENV"
          else
            echo "SHOULD_MIGRATE=true" >> "$GITHUB_ENV"
          fi

      # ⚠️ SUPABASE_ACCESS_TOKEN must be a CLASSIC 44-char token: `sbp_` + 40 hex.
      # CLI 2.84.2 validates against that regex and rejects the newer 47-char
      # `sbp_v0_...` tokens with:
      #     Invalid access token format. Must be like `sbp_0102...1920`.
      # That error reads like a bad secret, but the value can be perfectly clean —
      # it's a format/CLI-version mismatch. If you rotate the token and the dashboard
      # only issues `sbp_v0_...`, you must ALSO bump the CLI version below to one that
      # accepts it. (Verified 2026-07-12: 2.84.2 + classic token = works.)
      #
      # Do NOT go back to `version: latest` without `github-token` — resolving "latest"
      # unauthenticated gets rate-limited and silently falls back to a stale CLI.
      - name: Setup Supabase CLI
        if: env.SHOULD_MIGRATE == 'true'
        uses: supabase/setup-cli@v2
        with:
          version: 2.84.2
          github-token: ${{ github.token }}

      - name: List pending migrations (dry run)
        if: env.SHOULD_MIGRATE == 'true' && github.event.inputs.dry_run == 'true'
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
          supabase db push --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply migrations
        if: env.SHOULD_MIGRATE == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_ID }}"
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Setup Node.js
        if: env.SHOULD_MIGRATE == 'true' && github.event.inputs.dry_run != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Notify Notion
        if: env.SHOULD_MIGRATE == 'true' && github.event.inputs.dry_run != 'true'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DEV_TASKS_DB_ID: ${{ secrets.NOTION_DEV_TASKS_DB_ID }}
        run: |
          TASK_ID=$(git log --oneline -10 | grep -oE 'DEV-[0-9]+' | head -1 | tr '[:lower:]' '[:upper:]')
          if [ -n "$TASK_ID" ] && [ -n "$NOTION_TOKEN" ]; then
            node scripts/notion-sync.cjs status "$TASK_ID" "Testing"
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Migration Result" >> "$GITHUB_STEP_SUMMARY"
          echo "- Branch: main" >> "$GITHUB_STEP_SUMMARY"
          echo "- Time: $(date -u)" >> "$GITHUB_STEP_SUMMARY"
          if [ "${SHOULD_MIGRATE}" != "true" ]; then
            echo "- Mode: Skipped (Supabase secrets not configured)" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "- Mode: Dry run" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Mode: Applied to production" >> "$GITHUB_STEP_SUMMARY"
          fi
